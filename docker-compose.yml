services:
  # Сервис парсера PHP зависимостей
  parser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php-dependency-parser
    volumes:
      # Монтируем директорию с PHP проектом для анализа
      - ${MOUNTED_FOLDER_PATH}:/app/input:ro
      # Монтируем директорию для выходных данных
      - ${OUTPUT_FOLDER_PATH}:/app/output
    environment:
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT}
      - PHP_MAX_EXECUTION_TIME=${PHP_MAX_EXECUTION_TIME}
    # Команда по умолчанию (можно переопределить)
    command: >
      php /app/php_dependency_parser.php
      -d /app/input
      -o /app/output/dependencies
      --format json
    networks:
      - dependency-network

  # Сервис для запуска парсера в интерактивном режиме
  parser-interactive:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php-dependency-parser-interactive
    volumes:
      - ${MOUNTED_FOLDER_PATH}:/app/input:ro
      - ${OUTPUT_FOLDER_PATH}:/app/output
    environment:
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT}
      - PHP_MAX_EXECUTION_TIME=${PHP_MAX_EXECUTION_TIME}
    stdin_open: true
    tty: true
    profiles:
      - interactive
    networks:
      - dependency-network

  # Веб-сервер для визуализации
  web-visualizer:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: dependency-visualizer
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      # Монтируем выходные данные парсера для доступа веб-интерфейса
      - ${OUTPUT_FOLDER_PATH}:/usr/share/nginx/html/data
      # Монтируем HTML визуализатор (опционально, для разработки)
      - ./:/usr/share/nginx/html
    networks:
      - dependency-network

  # Сервис для Gephi (опционально)
  gephi:
    image: gephi/gephi:latest
    container_name: gephi-visualizer
    ports:
      - "8081:8080"
    volumes:
      - ${OUTPUT_FOLDER_PATH}:/root/gephi/data
      - gephi_data:/root/gephi
    environment:
      - DISPLAY=:99
    profiles:
      - gephi
    networks:
      - dependency-network

volumes:
  gephi_data:

networks:
  dependency-network:
    driver: bridge
